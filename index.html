<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | baloon poper</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
  </head>
  <body>
    <!-- Background Animation Layer -->
    <div class="bg-layer">
      <div class="balloon-bg" style="left: 10%; animation-delay: 0s; background: rgba(255, 60, 100, 0.4);"></div>
      <div class="balloon-bg" style="left: 30%; animation-delay: 3s; background: rgba(0, 200, 255, 0.4); width: 80px; height: 100px;"></div>
      <div class="balloon-bg" style="left: 50%; animation-delay: 7s; background: rgba(100, 255, 100, 0.4); width: 120px; height: 140px;"></div>
      <div class="balloon-bg" style="left: 70%; animation-delay: 2s; background: rgba(255, 200, 0, 0.4); width: 90px; height: 110px;"></div>
      <div class="balloon-bg" style="left: 90%; animation-delay: 5s; background: rgba(200, 100, 255, 0.4); width: 110px; height: 130px;"></div>
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div class="glass-panel">
          <h1 class="game-title">BALOON POPER</h1>
          <h2 class="game-subtitle">Get Ready to Pop!</h2>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
          <div id="unity-loading-text">Starting up<span class="loading-dots"></span></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/baloon poper web.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/baloon poper web.data.unityweb",
        frameworkUrl: buildUrl + "/baloon poper web.framework.js.unityweb",
        codeUrl: buildUrl + "/baloon poper web.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Ssdevelopers",
        productName: "baloon poper",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }


      loadingBar.style.display = "block";

      // Fetch Content-Length to determine total MB (fallback to known size 28.5 MB if headers are blocked)
      var totalDownloadSizeMB = 28.50; 
      async function getDownloadSize() {
        let totalBytes = 0;
        try {
          const urls = [config.dataUrl, config.codeUrl, config.frameworkUrl];
          for (const url of urls) {
            if(!url) continue;
            let resp = await fetch(url, { method: 'HEAD' });
            let len = resp.headers.get('content-length');
            if (len) {
              totalBytes += parseInt(len, 10);
            }
          }
          if (totalBytes > 0) {
            totalDownloadSizeMB = totalBytes / (1024 * 1024);
          }
        } catch (e) {
          console.warn("Could not fetch exact file sizes, using fallback size.");
        }
      }
      getDownloadSize();

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        var loadingText = document.getElementById('unity-loading-text');

        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
          
          // Calculate current MB
          var currentMB = (progress * totalDownloadSizeMB).toFixed(2);
          var totalStr = totalDownloadSizeMB.toFixed(2);
          
          if (progress === 1) {
            loadingText.innerHTML = `Complete! Enjoy the game.`;
          } else {
            loadingText.innerHTML = `Downloading: ${currentMB} MB / ${totalStr} MB`;
          }
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          // Hide background animation when game loads
          var bgLayer = document.querySelector('.bg-layer');
          if (bgLayer) bgLayer.style.display = 'none';
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
